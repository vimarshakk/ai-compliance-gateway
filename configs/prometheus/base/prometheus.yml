model:
  path: /model/config.yaml
  parameters:
    model: "prometheus/prometheus:latest"
    storage:
      tsdb:
        path: /prometheus
        retention.time: 15d
        retention.size: 5GB
    web:
      external_url: http://localhost:9090/prometheus/

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "litellm"
    static_configs:
      - targets: ["litellm:4000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:3000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  - job_name: "nats"
    static_configs:
      - targets: ["nats:8222"]

  - job_name: "kong"
    static_configs:
      - targets: ["kong:8444"]
    metrics_path: /status
