_format_version: "3.0"
_transform: true

consumers:
  - username: acg-gateway
    keyauth:
      - key: acg-gateway-key

services:
  - name: acg-gateway
    url: http://gateway:3000
    routes:
      - name: gateway-api
        paths:
          - /v1
        strip_path: false
        preserve_host: false
        plugins:
          - name: key-auth
            config:
              hide_credentials: true
          - name: rate-limiting
            config:
              minute: 100
              hour: 10000
              policy: local
          - name: cors
            config:
              origins:
                - "*"
              methods:
                - GET
                - POST
                - PUT
                - DELETE
                - PATCH
              headers:
                - Content-Type
                - Authorization
                - X-Request-Id
                - X-Organization-Id
              exposed_headers:
                - X-Request-Id
                - X-Rate-Limit-Remaining
          - name: request-transformer
            config:
              add:
                headers:
                  - X-Gateway-Timestamp:$(date)
              remove:
                headers:
                  - x-api-key

  - name: acg-admin
    url: http://admin:3002
    routes:
      - name: admin-api
        paths:
          - /admin
        strip_path: true
        preserve_host: false
        plugins:
          - name: key-auth
            config:
              hide_credentials: true
          - name: rate-limiting
            config:
              minute: 60
              hour: 3600
              policy: local
