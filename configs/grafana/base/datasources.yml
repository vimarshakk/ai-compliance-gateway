apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: false

  - name: ClickHouse
    type: clickhouse
    url: http://clickhouse:8123
    database: acg_audit
    editable: false

  - name: PostgreSQL
    type: postgres
    url: postgres:5432
    database: acg
    user: acg
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    editable: false
