server_name: acg-nats
listen: "0.0.0.0:4222"

http_port: 8222

jetstream {
  store_dir: "/data"
  max_mem: 256M
  max_file: 1G
}

accounts {
  ACG: {
    jetstream: enabled
    users: [
      { user: "acg", password: "acg-dev" }
    ]
    exports: [
      { stream: "audit.>" }
      { stream: "events.>" }
    ]
  }
}
