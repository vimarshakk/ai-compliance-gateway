[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "acg"
version = "0.1.0"
description = "AI Compliance Gateway Python SDK"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [
    { name = "ACG Contributors" }
]
keywords = ["ai", "compliance", "guardrails", "security", "llm"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "mypy>=1.11",
    "ruff>=0.6",
]

[project.urls]
Homepage = "https://github.com/vimarshakk/ai-compliance-gateway"
Repository = "https://github.com/vimarshakk/ai-compliance-gateway"
Issues = "https://github.com/vimarshakk/ai-compliance-gateway/issues"
Documentation = "https://github.com/vimarshakk/ai-compliance-gateway/tree/main/packages/sdk-python"

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
