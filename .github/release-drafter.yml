name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  ## What's Changed

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: '🔒 Security'
    labels:
      - 'security'
  - title: '📦 Dependencies'
    labels:
      - 'dependencies'
  - title: '📝 Documentation'
    labels:
      - 'documentation'
      - 'docs'
  - title: '🏗️ Infrastructure'
    labels:
      - 'ci'
      - 'docker'
  - title: '🧩 Compliance'
    labels:
      - 'compliance'
      - 'enterprise-packs'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'patch'
      - 'bug'
      - 'fix'
      - 'dependencies'
      - 'documentation'
      - 'ci'
      - 'docker'
  default: patch
