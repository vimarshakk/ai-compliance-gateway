name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run typecheck
      - run: pnpm -r run lint

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run build

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker build -t ghcr.io/acg/gateway:${{ github.sha }} -f deployments/docker/Dockerfile.gateway .
          docker build -t ghcr.io/acg/admin:${{ github.sha }} -f deployments/docker/Dockerfile.admin .
          docker build -t ghcr.io/acg/evaluator:${{ github.sha }} -f deployments/docker/Dockerfile.evaluator .
          docker build -t ghcr.io/acg/dashboard:${{ github.sha }} -f deployments/docker/Dockerfile.dashboard .
      - run: |
          docker push ghcr.io/acg/gateway:${{ github.sha }}
          docker push ghcr.io/acg/admin:${{ github.sha }}
          docker push ghcr.io/acg/evaluator:${{ github.sha }}
          docker push ghcr.io/acg/dashboard:${{ github.sha }}
