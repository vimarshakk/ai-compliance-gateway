name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below to help us investigate.

  - type: input
    id: version
    attributes:
      label: ACG Version
      description: What version of ACG are you using?
      placeholder: "e.g., 2.1.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Gateway
        - Admin API
        - Dashboard
        - CLI
        - Kernel
        - SDK (TypeScript)
        - SDK (Python)
        - SDK (Go)
        - MCP Server
        - VS Code Extension
        - Compliance Packs
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug.
      placeholder: "What happened?"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Send request to...
        2. With configuration...
        3. Observe error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant configuration (redact secrets).
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Any relevant log output.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - OS: [e.g., Ubuntu 22.04]
        - Node.js: [e.g., 18.17.0]
        - Docker: [e.g., 24.0.5]
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have redacted any secrets from logs/config
          required: true
