name: 'AI Compliance Scan'
description: 'Scan your codebase for AI compliance issues using ACG'
author: 'acg-ai'

inputs:
  api-key:
    description: 'ACG API key'
    required: false
  gateway-url:
    description: 'ACG Gateway URL'
    required: false
    default: 'http://localhost:3000'
  admin-url:
    description: 'ACG Admin URL'
    required: false
    default: 'http://localhost:3002'
  scan-path:
    description: 'Path to scan'
    required: false
    default: '.'
  compliance-pack:
    description: 'Compliance pack to use (dpdp, hipaa, gdpr, pci-dss, soc2)'
    required: false
  score-threshold:
    description: 'Minimum compliance score (0-100). Fail if below.'
    required: false
    default: '70'
  output-format:
    description: 'Output format (json, table)'
    required: false
    default: 'table'
  fail-on-findings:
    description: 'Fail if any findings detected'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install ACG CLI
      shell: bash
      run: npm install -g @acg/cli

    - name: Run compliance scan
      shell: bash
      working-directory: ${{ inputs.scan-path }}
      env:
        ACG_API_KEY: ${{ inputs.api-key }}
        GATEWAY_URL: ${{ inputs.gateway-url }}
        ADMIN_URL: ${{ inputs.admin-url }}
      run: |
        echo "🔍 Running AI Compliance Scan..."
        acg scan --output scan-results.json --format ${{ inputs.output-format }}

        echo ""
        echo "📊 Generating compliance score..."
        acg score --output score-results.json --format ${{ inputs.output-format }}

        echo ""
        echo "📦 Generating AI Bill of Materials..."
        acg bom --output bom-results.json --format ${{ inputs.output-format }}

    - name: Check score threshold
      shell: bash
      working-directory: ${{ inputs.scan-path }}
      run: |
        if [ -f score-results.json ]; then
          SCORE=$(cat score-results.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('score', 0))" 2>/dev/null || echo "0")
          THRESHOLD=${{ inputs.score-threshold }}

          echo "📈 Compliance Score: ${SCORE}/100 (threshold: ${THRESHOLD})"

          if [ "$SCORE" -lt "$THRESHOLD" ]; then
            echo "❌ Compliance score ${SCORE} is below threshold ${THRESHOLD}"
            exit 1
          fi
          echo "✅ Compliance score meets threshold"
        fi

    - name: Check for findings
      shell: bash
      working-directory: ${{ inputs.scan-path }}
      if: inputs.fail-on-findings == 'true'
      run: |
        if [ -f scan-results.json ]; then
          FINDINGS=$(cat scan-results.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('summary',{}).get('totalFindings', 0))" 2>/dev/null || echo "0")

          if [ "$FINDINGS" -gt 0 ]; then
            echo "❌ ${FINDINGS} compliance finding(s) detected"
            cat scan-results.json
            exit 1
          fi
          echo "✅ No compliance findings"
        fi

    - name: Upload scan results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: acg-scan-results
        path: |
          ${{ inputs.scan-path }}/scan-results.json
          ${{ inputs.scan-path }}/score-results.json
          ${{ inputs.scan-path }}/bom-results.json
        retention-days: 30

    - name: Post summary
      shell: bash
      working-directory: ${{ inputs.scan-path }}
      if: always()
      run: |
        if [ -f score-results.json ]; then
          SCORE=$(cat score-results.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('score', 0))" 2>/dev/null || echo "0")
          echo "## AI Compliance Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Score | ${SCORE}/100 |" >> $GITHUB_STEP_SUMMARY
          if [ -f scan-results.json ]; then
            FINDINGS=$(cat scan-results.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('summary',{}).get('totalFindings', 0))" 2>/dev/null || echo "0")
            echo "| Findings | ${FINDINGS} |" >> $GITHUB_STEP_SUMMARY
          fi
        fi
